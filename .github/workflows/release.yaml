# .github/workflows/release.yaml
name: Release on Version Change

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn test -B --no-transfer-progress

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: version_change
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          NEW_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual trigger — forcing release of $NEW_VERSION"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            OLD_VERSION=$(git show "${BEFORE_SHA}:pom.xml" 2>/dev/null | grep -m1 '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/' || echo "")
            echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
            if [ -n "$OLD_VERSION" ] && [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Java
        if: steps.version_change.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        if: steps.version_change.outputs.changed == 'true'
        run: mvn package -B --no-transfer-progress -DskipTests

      - name: Create tag
        if: steps.version_change.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.version_change.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${NEW_VERSION}" 2>/dev/null || echo "Tag v${NEW_VERSION} already exists, skipping"
          git push origin "v${NEW_VERSION}" 2>/dev/null || echo "Tag already pushed, skipping"

      - name: Create GitHub Release with JAR
        if: steps.version_change.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version_change.outputs.new_version }}
        run: |
          gh release view "v${NEW_VERSION}" &>/dev/null && echo "Release already exists, skipping" && exit 0
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --generate-notes \
            "vertx4-rxjava3-otel-autoconfigure/target/vertx4-rxjava3-otel-autoconfigure-${NEW_VERSION}.jar" \
            "vertx4-rxjava3-otel-autoconfigure/target/vertx4-rxjava3-otel-autoconfigure-${NEW_VERSION}-sources.jar" \
            "vertx3-rxjava2-otel-autoconfigure/target/vertx3-rxjava2-otel-autoconfigure-${NEW_VERSION}.jar" \
            "vertx3-rxjava2-otel-autoconfigure/target/vertx3-rxjava2-otel-autoconfigure-${NEW_VERSION}-sources.jar" \
            "vertx3-otel-agent/target/vertx3-otel-agent-${NEW_VERSION}.jar" \
            "vertx3-otel-agent/target/vertx3-otel-agent-${NEW_VERSION}-sources.jar"

      # Publish to Maven Central via Sonatype Central Portal.
      # Re-configure Java with GPG key and Maven server credentials — setup-java writes
      # ~/.m2/settings.xml mapping MAVEN_USERNAME/MAVEN_PASSWORD to the 'central' server.
      - name: Set up Java for Maven Central publishing
        if: steps.version_change.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Publish to Maven Central
        if: steps.version_change.outputs.changed == 'true'
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn deploy -P release -DskipTests -B --no-transfer-progress

  docker:
    name: Build and push agent init container images
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JARs
        run: mvn package -B --no-transfer-progress -DskipTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Vert.x 4 agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.java4-agent
          push: true
          tags: |
            ghcr.io/last9/vertx-otel-java4:${{ steps.version.outputs.version }}
            ghcr.io/last9/vertx-otel-java4:latest

      - name: Build and push Vert.x 3 agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.java3-agent
          push: true
          tags: |
            ghcr.io/last9/vertx-otel-java3:${{ steps.version.outputs.version }}
            ghcr.io/last9/vertx-otel-java3:latest

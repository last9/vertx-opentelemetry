name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn test -B --no-transfer-progress

      - name: Build JARs
        run: mvn package -B --no-transfer-progress -DskipTests

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ github.sha }}
          retention-days: 14
          path: |
            vertx4-rxjava3-otel-autoconfigure/target/*.jar
            vertx3-rxjava2-otel-autoconfigure/target/*.jar
            vertx3-otel-agent/target/*.jar
